name: Verify

# Runs all computational verification checks on every push/PR to main.
# No Pandoc or LaTeX needed — the PDF is pre-built and committed to pdfs/.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e .

      - name: Run all verification checks
        run: python scripts/run_verification.py

      - name: Generate figures (verify data pipeline)
        run: python scripts/generate_figures.py
