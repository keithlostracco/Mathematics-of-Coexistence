name: Release

# Triggered by pushing a revision tag (e.g. rev1, rev2, rev3).
# Runs verification, builds PDFs from committed TeX sources via latexmk,
# then creates a GitHub Release with PDFs attached.
on:
  push:
    tags:
      - "rev*"

permissions:
  contents: write   # required to create GitHub Releases

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e .

      - name: Run all verification checks
        run: python scripts/run_verification.py

      - name: Install TeX Live
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            texlive-latex-extra texlive-fonts-recommended \
            texlive-science texlive-plain-generic latexmk

      - name: Build PDFs from TeX sources
        run: |
          mkdir -p pdf
          for paperdir in tex/*/paper/; do
            if [ -d "$paperdir" ]; then
              paper=$(basename "$(dirname "$paperdir")")
              main_tex=$(grep -rl '\\begin{document}' "$paperdir" | head -1)
              if [ -n "$main_tex" ]; then
                echo "::group::Building $paper"
                (cd "$paperdir" && latexmk -pdf -interaction=nonstopmode \
                  "$(basename "$main_tex")")
                cp "$paperdir"*.pdf pdf/ 2>/dev/null || true
                echo "::endgroup::"
              fi
            fi
          done

      # ── GitHub Release ──────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "The Mathematics of Coexistence — ${{ github.ref_name }}"
          body: |
            **The Mathematics of Coexistence: A Formal Framework for Universal Ethics**
            *Keith Lostracco*

            ---
            All verification checks passed · ${{ github.sha }}
          files: pdf/*.pdf
          fail_on_unmatched_files: true
          make_latest: true
