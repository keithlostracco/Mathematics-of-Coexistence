name: Release

# Triggered by pushing a revision tag (e.g. rev1, rev2, rev3).
# Runs verification, then creates a GitHub Release with all pre-built
# PDFs from pdf/ attached as download assets.
on:
  push:
    tags:
      - "rev*"

permissions:
  contents: write   # required to create GitHub Releases

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e .

      - name: Run all verification checks
        run: python scripts/run_verification.py

      # ── GitHub Release ──────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "The Mathematics of Coexistence — ${{ github.ref_name }}"
          body: |
            **The Mathematics of Coexistence: A Formal Framework for Universal Ethics**
            *Keith Lostracco*

            ---
            All verification checks passed · ${{ github.sha }}
          files: pdf/*.pdf
          fail_on_unmatched_files: true
          make_latest: true
